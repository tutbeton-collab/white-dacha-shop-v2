<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Белая дача — Заказ овощей</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #2E7D32; --green-light: #4CAF50; --green-dark: #1B5E20;
      --orange: #FF6D00; --bg: #F8F9FA; --card: #FFFFFF;
      --text: #1A1A1A; --text-sec: #6B7280; --border: #E5E7EB;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 16px;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { background: linear-gradient(135deg, var(--green), var(--green-light)); color: white; padding: 20px 20px 24px; position: sticky; top: 0; z-index: 100; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 42px; height: 42px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .logo-text h1 { font-size: 18px; font-weight: 700; }
    .logo-text span { font-size: 12px; opacity: 0.85; }
    .header-cart { width: 44px; height: 44px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; position: relative; }
    .header-cart .badge { position: absolute; top: -4px; right: -4px; background: var(--orange); color: white; border-radius: 10px; min-width: 20px; height: 20px; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; display: none; }
    .search-bar { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
    .search-bar input { background: none; border: none; color: white; font-size: 14px; width: 100%; outline: none; }
    .search-bar input::placeholder { color: rgba(255,255,255,0.6); }
    .categories { display: flex; gap: 8px; padding: 16px 20px; overflow-x: auto; scrollbar-width: none; }
    .categories::-webkit-scrollbar { display: none; }
    .cat-btn { padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-weight: 500; color: var(--text-sec); white-space: nowrap; cursor: pointer; }
    .cat-btn.active { background: var(--green); color: white; border-color: var(--green); }
    .section-title { font-size: 18px; font-weight: 700; padding: 0 20px; margin-bottom: 12px; }
    .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 20px; }
    .product-card { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .product-img { width: 100%; height: 140px; object-fit: cover; display: block; }
    .product-img-ph { width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; font-size: 56px; background: linear-gradient(135deg, #E8F5E9, #F1F8E9); }
    .product-info { padding: 12px; }
    .product-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .product-note { font-size: 11px; color: var(--text-sec); margin-bottom: 8px; }
    .product-bottom { display: flex; align-items: center; justify-content: space-between; }
    .product-price { font-size: 15px; font-weight: 700; color: var(--green); }
    .product-price small { font-size: 11px; font-weight: 400; color: var(--text-sec); }
    .add-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--green); color: white; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .qty-control { display: flex; align-items: center; gap: 8px; }
    .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .qty-val { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }
    .cart-fab { position: fixed; bottom: 24px; right: 20px; background: var(--orange); color: white; border: none; border-radius: 16px; padding: 14px 20px; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 20px rgba(255,109,0,0.4); z-index: 200; display: none; align-items: center; gap: 8px; }
    .cart-fab .fab-badge { background: white; color: var(--orange); border-radius: 10px; min-width: 22px; height: 22px; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
    .page { display: none; padding-bottom: 100px; }
    .page.active { display: block; }
    .cart-header { background: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .back-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--bg); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .cart-items { padding: 16px 20px; }
    .cart-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: center; }
    .cart-item-img { width: 64px; height: 64px; border-radius: 12px; object-fit: cover; background: #E8F5E9; display: flex; align-items: center; justify-content: center; font-size: 32px; flex-shrink: 0; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .cart-item-price { font-size: 13px; color: var(--text-sec); }
    .cart-item-right { text-align: right; }
    .cart-item-total { font-size: 15px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
    .cart-summary { background: white; margin: 0 20px; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
    .cart-summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: var(--text-sec); }
    .cart-summary-row.total { font-size: 18px; font-weight: 700; color: var(--text); margin-top: 8px; padding-top: 12px; border-top: 1px solid var(--border); }
    .cart-summary-row.total .amount { color: var(--green); }
    .checkout-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--green), var(--green-light)); color: white; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; }
    .form-page { padding: 0 20px 100px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-sec); }
    .form-group input, .form-group textarea { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; font-family: inherit; outline: none; background: white; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--green); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .success-page { text-align: center; padding: 60px 20px; }
    .success-icon { width: 80px; height: 80px; background: linear-gradient(135deg, var(--green), var(--green-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 24px; }
    .success-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    .success-text { font-size: 15px; color: var(--text-sec); line-height: 1.6; }
    .new-order-btn { width: 100%; padding: 16px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; }
    .empty-cart { text-align: center; padding: 60px 20px; color: var(--text-sec); }
  </style>
</head>
<body>
<script src="https://st.max.ru/js/max-web-app.js"></script>
<div id="app">
  <div id="page-catalog" class="page active">
    <div class="header">
      <div class="header-top">
        <div class="logo"><div class="logo-icon">🌿</div><div class="logo-text"><h1>Белая дача</h1><span>Свежие овощи с грядки</span></div></div>
        <div class="header-cart" onclick="showPage('cart')">🛒<span class="badge" id="header-cart-count">0</span></div>
      </div>
      <div class="search-bar"><span>🔍</span><input type="text" placeholder="Найти овощи..." id="search-input" oninput="filterProducts()"></div>
    </div>
    <div class="categories">
      <div class="cat-btn active" onclick="filterCategory('all',this)">Все</div>
      <div class="cat-btn" onclick="filterCategory('vegetables',this)">🥬 Овощи</div>
      <div class="cat-btn" onclick="filterCategory('greens',this)">🌿 Зелень</div>
      <div class="cat-btn" onclick="filterCategory('potato',this)">🥔 Картофель</div>
    </div>
    <div class="section-title">Каталог</div>
    <div id="products-grid" class="products-grid"></div>
  </div>
  <div id="page-cart" class="page">
    <div class="cart-header"><button class="back-btn" onclick="showPage('catalog')">←</button><h2>Корзина</h2></div>
    <div id="cart-content"></div>
  </div>
  <div id="page-order" class="page">
    <div class="cart-header"><button class="back-btn" onclick="showPage('cart')">←</button><h2>Оформление заказа</h2></div>
    <div class="form-page" style="padding-top:16px;">
      <form id="order-form" onsubmit="submitOrder(event)">
        <div class="form-group"><label>Ваше имя *</label><input type="text" id="f-name" required placeholder="Иван Иванов"></div>
        <div class="form-group"><label>Телефон *</label><input type="tel" id="f-phone" required placeholder="+7 (999) 999-99-99"></div>
        <div class="form-group"><label>Адрес доставки *</label><textarea id="f-address" required placeholder="Город, улица, дом, квартира..."></textarea></div>
        <div class="form-group"><label>Дата доставки *</label><input type="date" id="f-date" required></div>
        <div class="form-group"><label>Пожелания</label><textarea id="f-comment" placeholder="Удобное время, примечания..."></textarea></div>
        <button type="submit" class="checkout-btn" id="submit-btn">Подтвердить заказ</button>
      </form>
    </div>
  </div>
  <div id="page-success" class="page">
    <div class="success-page">
      <div class="success-icon">✓</div>
      <div class="success-title">Заказ принят!</div>
      <div class="success-text" id="success-text"></div>
      <button class="new-order-btn" onclick="resetAndGoHome()">Заказать ещё</button>
    </div>
  </div>
</div>
<button class="cart-fab" id="cart-fab" onclick="showPage('cart')">🛒 Корзина <span class="fab-badge" id="fab-count">0</span></button>

<script>
// Real photos from the farm (local paths for now, will be replaced with hosted URLs)
const PHOTOS = {
  tomato: 'https://raw.githubusercontent.com/tutbeton-collab/white-dacha-shop/master/tomato.jpg',    // №25
  cucumber: 'https://raw.githubusercontent.com/tutbeton-collab/white-dacha-shop/master/cucumber.jpg', // №11
  pepper: 'https://raw.githubusercontent.com/tutbeton-collab/white-dacha-shop/master/pepper.jpg',     // №8
  eggplant: 'https://raw.githubusercontent.com/tutbeton-collab/white-dacha-shop/master/eggplant.jpg', // №9
  potato: 'https://raw.githubusercontent.com/tutbeton-collab/white-dacha-shop/master/potato.webp',     // existing webp
};

const PRODUCTS = [
  { id: 1, name: 'Помидоры', emoji: '🍅', price: 500, unitName: 'ведро', note: 'Спелые, с грядки', cat: 'vegetables', img: PHOTOS.tomato },
  { id: 2, name: 'Огурцы', emoji: '🥒', price: 500, unitName: 'ведро', note: 'Хрустящие, свежие', cat: 'vegetables', img: PHOTOS.cucumber },
  { id: 3, name: 'Перец болгарский', emoji: '🫑', price: 250, unitName: 'ведро', note: 'Сочный, сладкий', cat: 'vegetables', img: PHOTOS.pepper },
  { id: 4, name: 'Баклажаны', emoji: '🍆', price: 300, unitName: 'ведро', note: 'Отборные', cat: 'vegetables', img: PHOTOS.eggplant },
  { id: 5, name: 'Картошка', emoji: '🥔', price: 200, unitName: 'ведро', note: 'Молодой картофель', cat: 'potato', img: PHOTOS.potato },
  { id: 6, name: 'Перец острый', emoji: '🌶️', price: 100, unitName: '12 шт', note: 'Острый, ароматный', cat: 'vegetables', img: null },
  { id: 7, name: 'Кукуруза', emoji: '🌽', price: 100, unitName: '3 шт', note: 'Сладкая, молодая', cat: 'vegetables', img: null },
  { id: 8, name: 'Кабачок', emoji: '🥒', price: 100, unitName: '3 шт', note: 'Небольшие, нежные', cat: 'vegetables', img: null },
  { id: 9, name: 'Арбуз', emoji: '🍉', price: 100, unitName: 'шт', note: 'Спелый, сладкий', cat: 'vegetables', img: null },
  { id: 10, name: 'Укроп', emoji: '🌿', price: 50, unitName: 'пучок', note: 'Ароматный, свежий', cat: 'greens', img: null },
];

let cart = {};
let currentCategory = 'all';

function init() {
  if (window.WebApp) { window.WebApp.ready(); window.WebApp.enableClosingConfirmation(); }
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  document.getElementById('f-date').min = tomorrow.toISOString().split('T')[0];
  document.getElementById('f-date').value = document.getElementById('f-date').min;
  renderProducts();
}

function renderProducts() {
  const grid = document.getElementById('products-grid');
  const search = document.getElementById('search-input')?.value?.toLowerCase() || '';
  let filtered = PRODUCTS;
  if (currentCategory !== 'all') filtered = filtered.filter(p => p.cat === currentCategory);
  if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));
  
  grid.innerHTML = filtered.map(p => {
    const qty = cart[p.id] || 0;
    const imgHtml = p.img 
      ? `<img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="product-img-ph" style="display:none">${p.emoji}</div>`
      : `<div class="product-img-ph">${p.emoji}</div>`;
    
    const btnHtml = qty > 0
      ? `<div class="qty-control"><button class="qty-btn" onclick="changeQty(${p.id},-1)">−</button><span class="qty-val">${qty}</span><button class="qty-btn" onclick="changeQty(${p.id},1)">+</button></div>`
      : `<button class="add-btn" onclick="addToCart(${p.id})">+</button>`;
    
    return `<div class="product-card">${imgHtml}<div class="product-info"><div class="product-name">${p.name}</div><div class="product-note">${p.note}</div><div class="product-bottom"><div class="product-price">${p.price} ₽ <small>/ ${p.unitName}</small></div>${btnHtml}</div></div></div>`;
  }).join('');
}

function addToCart(id) { cart[id] = (cart[id]||0)+1; renderProducts(); updateCartUI(); }
function changeQty(id, d) { cart[id]=(cart[id]||0)+d; if(cart[id]<=0)delete cart[id]; renderProducts(); updateCartUI(); }

function updateCartUI() {
  const count = Object.values(cart).reduce((a,b)=>a+b,0);
  const badge = document.getElementById('header-cart-count');
  const fab = document.getElementById('cart-fab');
  if (count > 0) { badge.style.display='flex'; badge.textContent=count; fab.style.display='flex'; document.getElementById('fab-count').textContent=count; }
  else { badge.style.display='none'; fab.style.display='none'; }
}

function filterCategory(cat, el) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderProducts();
}
function filterProducts() { renderProducts(); }

function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  window.scrollTo(0,0);
  if (name==='cart') renderCart();
  if (name==='catalog') renderProducts();
  if (window.WebApp?.BackButton) { name==='catalog'?window.WebApp.BackButton.hide():window.WebApp.BackButton.show(); }
}

function renderCart() {
  const c = document.getElementById('cart-content');
  const items = Object.entries(cart).map(([id,qty])=>{const p=PRODUCTS.find(x=>x.id==id);return{...p,qty};}).filter(x=>x.qty>0);
  if (!items.length) { c.innerHTML='<div class="empty-cart"><div style="font-size:64px;margin-bottom:16px">🛒</div><p>Корзина пуста</p></div>'; return; }
  const total = items.reduce((s,x)=>s+x.price*x.qty,0);
  c.innerHTML = `<div class="cart-items">${items.map(x=>{
    const img = x.img ? `<img src="${x.img}" alt="${x.name}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" onerror="this.style.display='none';this.parentElement.innerHTML='${x.emoji}'">` : x.emoji;
    return `<div class="cart-item"><div class="cart-item-img">${img}</div><div class="cart-item-info"><div class="cart-item-name">${x.name}</div><div class="cart-item-price">${x.price}₽ / ${x.unitName}</div></div><div class="cart-item-right"><div class="cart-item-total">${x.price*x.qty}₽</div><div class="qty-control"><button class="qty-btn" onclick="changeQty(${x.id},-1)">−</button><span class="qty-val">${x.qty}</span><button class="qty-btn" onclick="changeQty(${x.id},1)">+</button></div></div></div>`;
  }).join('')}</div><div class="cart-summary"><div class="cart-summary-row"><span>Доставка</span><span style="color:var(--green)">Бесплатно</span></div><div class="cart-summary-row total"><span>Итого</span><span class="amount">${total}₽</span></div><button class="checkout-btn" onclick="showPage('order')">Оформить заказ →</button></div>`;
}

async function submitOrder(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Отправка...';
  const items = Object.entries(cart).map(([id,qty])=>{const p=PRODUCTS.find(x=>x.id==id);return`${p.emoji} ${p.name} — ${qty}×${p.unitName}=${qty*p.price}₽`;}).join('\n');
  const total = Object.entries(cart).reduce((s,[id,qty])=>{const p=PRODUCTS.find(x=>x.id==id);return s+p.price*qty;},0);
  const text = `🛒 НОВЫЙ ЗАКАЗ — Белая дача\n\n${items}\n\n💰 Итого: ${total}₽\n\n👤 ${document.getElementById('f-name').value}\n📱 ${document.getElementById('f-phone').value}\n📍 ${document.getElementById('f-address').value}\n📅 ${document.getElementById('f-date').value}\n💬 ${document.getElementById('f-comment').value||'—'}`;
  try {
    const r = await fetch('https://platform-api.max.ru/messages?chat_id=72239874',{method:'POST',headers:{'Authorization':'f9LHodD0cOKFL-oH0VPTMHXpJNS6Sw5p6-6njHawNW5WNWZYwLa80iKMfegqFXgB1wINPS85bnC4lZSITS8-','Content-Type':'application/json'},body:JSON.stringify({text,notify:true})});
    if(r.ok){document.getElementById('success-text').textContent=`Заказ на ${total}₽ принят!\nДоставка: ${document.getElementById('f-date').value}\nАдрес: ${document.getElementById('f-address').value}\n\nОплата наличными. Мы свяжемся для подтверждения.`;showPage('success');}
    else{alert('Ошибка отправки');btn.disabled=false;btn.textContent='Подтвердить заказ';}
  }catch(err){alert('Ошибка сети');btn.disabled=false;btn.textContent='Подтвердить заказ';}
}

function resetAndGoHome(){cart={};updateCartUI();document.getElementById('order-form').reset();const t=new Date();t.setDate(t.getDate()+1);document.getElementById('f-date').value=t.toISOString().split('T')[0];showPage('catalog');}

if(window.WebApp?.BackButton){window.WebApp.BackButton.onClick(()=>{const p=document.querySelector('.page.active').id;if(p==='page-cart')showPage('catalog');else if(p==='page-order')showPage('cart');else if(page-success)resetAndGoHome();});}

init();
</script>
</body>
</html>
