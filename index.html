<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Белая дача — Заказ овощей</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --green: #2E7D32;
      --green-light: #4CAF50;
      --green-dark: #1B5E20;
      --orange: #FF6D00;
      --orange-light: #FF9800;
      --bg: #F8F9FA;
      --card: #FFFFFF;
      --text: #1A1A1A;
      --text-secondary: #6B7280;
      --border: #E5E7EB;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
      --radius: 16px;
      --radius-sm: 12px;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
      color: white;
      padding: 20px 20px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(46,125,50,0.3);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      backdrop-filter: blur(10px);
    }
    .logo-text h1 {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }
    .logo-text span {
      font-size: 12px;
      opacity: 0.85;
      font-weight: 400;
    }
    .header-cart {
      position: relative;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: transform 0.2s;
    }
    .header-cart:active { transform: scale(0.95); }
    .header-cart .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--orange);
      color: white;
      border-radius: 10px;
      min-width: 20px;
      height: 20px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      box-shadow: 0 2px 8px rgba(255,109,0,0.4);
    }

    /* Search */
    .search-bar {
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(10px);
    }
    .search-bar input {
      background: none;
      border: none;
      color: white;
      font-size: 14px;
      width: 100%;
      outline: none;
    }
    .search-bar input::placeholder { color: rgba(255,255,255,0.6); }
    .search-bar .search-icon { font-size: 16px; opacity: 0.7; }

    /* Categories */
    .categories {
      display: flex;
      gap: 8px;
      padding: 16px 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .categories::-webkit-scrollbar { display: none; }
    .cat-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-btn.active {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }

    /* Products */
    .section-title {
      font-size: 18px;
      font-weight: 700;
      padding: 0 20px;
      margin-bottom: 12px;
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 20px;
    }
    .product-card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .product-card:active { transform: scale(0.98); }
    .product-img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }
    .product-img-placeholder {
      width: 100%;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      background: linear-gradient(135deg, #E8F5E9 0%, #F1F8E9 100%);
    }
    .product-info { padding: 12px; }
    .product-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .product-note {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .product-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .product-price {
      font-size: 15px;
      font-weight: 700;
      color: var(--green);
    }
    .product-price small {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-secondary);
    }
    .add-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--green);
      color: white;
      border: none;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.15s;
      box-shadow: 0 2px 8px rgba(46,125,50,0.3);
    }
    .add-btn:active { transform: scale(0.9); background: var(--green-dark); }
    .add-btn.added { background: var(--orange); }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }
    .qty-btn:active { background: var(--bg); }
    .qty-val {
      font-size: 14px;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
    }

    /* Cart FAB */
    .cart-fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,109,0,0.4);
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s;
    }
    .cart-fab:active { transform: scale(0.95); }
    .cart-fab .fab-badge {
      background: white;
      color: var(--orange);
      border-radius: 10px;
      min-width: 22px;
      height: 22px;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    /* Pages */
    .page { display: none; padding-bottom: 100px; }
    .page.active { display: block; }

    /* Cart Page */
    .cart-header {
      background: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--bg);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cart-header h2 { font-size: 18px; font-weight: 700; }
    
    .cart-items { padding: 16px 20px; }
    .cart-item {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-img {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      background: #E8F5E9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
    }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .cart-item-price { font-size: 13px; color: var(--text-secondary); }
    .cart-item-right { text-align: right; }
    .cart-item-total { font-size: 15px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
    
    .cart-summary {
      background: white;
      margin: 0 20px;
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .cart-summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .cart-summary-row.total {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-top: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      margin-bottom: 0;
    }
    .cart-summary-row.total .amount { color: var(--green); }

    .checkout-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: transform 0.15s;
    }
    .checkout-btn:active { transform: scale(0.98); }

    /* Order Form */
    .form-page { padding: 0 20px 100px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      background: white;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--green);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    /* Success */
    .success-page {
      text-align: center;
      padding: 60px 20px;
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 30px rgba(46,125,50,0.3);
    }
    .success-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    .success-text { font-size: 15px; color: var(--text-secondary); line-height: 1.6; }
    .success-order {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .success-order h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .success-order p { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

    .new-order-btn {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }

    /* Empty cart */
    .empty-cart {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .empty-cart .icon { font-size: 64px; margin-bottom: 16px; }
    .empty-cart p { font-size: 15px; }

    /* Animations */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .product-card { animation: slideUp 0.3s ease-out; }
  </style>
</head>
<body>

<!-- MAX Bridge -->
<script src="https://st.max.ru/js/max-web-app.js"></script>

<div id="app">
  <!-- Каталог -->
  <div id="page-catalog" class="page active">
    <div class="header">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">🌿</div>
          <div class="logo-text">
            <h1>Белая дача</h1>
            <span>Свежие овощи с грядки</span>
          </div>
        </div>
        <div class="header-cart" onclick="showPage('cart')">
          🛒
          <span class="badge" id="header-cart-count" style="display:none;">0</span>
        </div>
      </div>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Найти овощи..." id="search-input" oninput="filterProducts()">
      </div>
    </div>

    <div class="categories">
      <div class="cat-btn active" onclick="filterCategory('all', this)">Все</div>
      <div class="cat-btn" onclick="filterCategory('vegetables', this)">🥬 Овощи</div>
      <div class="cat-btn" onclick="filterCategory('greens', this)">🌿 Зелень</div>
      <div class="cat-btn" onclick="filterCategory('fruits', this)">🍉 Фрукты</div>
    </div>

    <div class="section-title">Каталог</div>
    <div id="products-grid" class="products-grid"></div>
  </div>

  <!-- Корзина -->
  <div id="page-cart" class="page">
    <div class="cart-header">
      <button class="back-btn" onclick="showPage('catalog')">←</button>
      <h2>Корзина</h2>
    </div>
    <div id="cart-content"></div>
  </div>

  <!-- Оформление -->
  <div id="page-order" class="page">
    <div class="cart-header">
      <button class="back-btn" onclick="showPage('cart')">←</button>
      <h2>Оформление заказа</h2>
    </div>
    <div class="form-page" style="padding-top: 16px;">
      <form id="order-form" onsubmit="submitOrder(event)">
        <div class="form-group">
          <label>Ваше имя *</label>
          <input type="text" id="f-name" required placeholder="Иван Иванов">
        </div>
        <div class="form-group">
          <label>Телефон *</label>
          <input type="tel" id="f-phone" required placeholder="+7 (999) 999-99-99">
        </div>
        <div class="form-group">
          <label>Адрес доставки *</label>
          <textarea id="f-address" required placeholder="Город, улица, дом, квартира, подъезд, код домофона"></textarea>
        </div>
        <div class="form-group">
          <label>Дата доставки *</label>
          <input type="date" id="f-date" required>
        </div>
        <div class="form-group">
          <label>Пожелания</label>
          <textarea id="f-comment" placeholder="Удобное время, примечания к заказу..."></textarea>
        </div>
        <button type="submit" class="checkout-btn" id="submit-btn">Подтвердить заказ</button>
      </form>
    </div>
  </div>

  <!-- Успех -->
  <div id="page-success" class="page">
    <div class="success-page">
      <div class="success-icon">✓</div>
      <div class="success-title">Заказ принят!</div>
      <div class="success-text" id="success-text"></div>
      <div class="success-order" id="success-order"></div>
      <button class="new-order-btn" onclick="resetAndGoHome()">Заказать ещё</button>
    </div>
  </div>
</div>

<!-- Cart FAB -->
<button class="cart-fab" id="cart-fab" onclick="showPage('cart')" style="display:none;">
  🛒 Корзина
  <span class="fab-badge" id="fab-count">0</span>
</button>

<script>
// ===== КАТАЛОГ =====
const PRODUCTS = [
  { id: 1, name: 'Помидоры', emoji: '🍅', price: 500, unitName: 'ведро', note: 'Спелые, с грядки', category: 'vegetables', img: 'https://images.unsplash.com/photo-1546470427-e2c4d5abdd4b?w=400&h=300&fit=crop' },
  { id: 2, name: 'Огурцы', emoji: '🥒', price: 500, unitName: 'ведро', note: 'Хрустящие, свежие', category: 'vegetables', img: 'https://images.unsplash.com/photo-1449300079323-02e209d9d3a6?w=400&h=300&fit=crop' },
  { id: 3, name: 'Перец болгарский', emoji: '🫑', price: 250, unitName: 'ведро', note: 'Сочный, сладкий', category: 'vegetables', img: 'https://images.unsplash.com/photo-1563565375-f3fdfdbefa83?w=400&h=300&fit=crop' },
  { id: 4, name: 'Перец острый', emoji: '🌶️', price: 100, unitName: '12 шт', note: 'Острый, ароматный', category: 'vegetables', img: 'https://images.unsplash.com/photo-1583623025817-d180a2221d0a?w=400&h=300&fit=crop' },
  { id: 5, name: 'Баклажаны', emoji: '🍆', price: 300, unitName: 'ведро', note: 'Отборные', category: 'vegetables', img: 'https://images.unsplash.com/photo-1615485290382-441e4d049cb5?w=400&h=300&fit=crop' },
  { id: 6, name: 'Картошка', emoji: '🥔', price: 200, unitName: 'ведро', note: 'Молодой картофель', category: 'vegetables', img: 'https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=400&h=300&fit=crop' },
  { id: 7, name: 'Кукуруза', emoji: '🌽', price: 100, unitName: '3 шт', note: 'Сладкая, молодая', category: 'vegetables', img: 'https://images.unsplash.com/photo-1551754655-cd27e38d2076?w=400&h=300&fit=crop' },
  { id: 8, name: 'Кабачок', emoji: '🥒', price: 100, unitName: '3 шт', note: 'Небольшие, нежные', category: 'vegetables', img: 'https://images.unsplash.com/photo-1574281143790-752264c0251f?w=400&h=300&fit=crop' },
  { id: 9, name: 'Арбуз', emoji: '🍉', price: 100, unitName: 'шт', note: 'Спелый, сладкий', category: 'fruits', img: 'https://images.unsplash.com/photo-1589984662646-e7b2e4962f18?w=400&h=300&fit=crop' },
  { id: 10, name: 'Укроп', emoji: '🌿', price: 50, unitName: 'пучок', note: 'Ароматный, свежий', category: 'greens', img: 'https://images.unsplash.com/photo-1629157282069-4a0e0633e630?w=400&h=300&fit=crop' },
  { id: 11, name: 'Петрушка', emoji: '🌿', price: 50, unitName: 'пучок', note: 'Свежая, яркая', category: 'greens', img: 'https://images.unsplash.com/photo-1629157282069-4a0e0633e630?w=400&h=300&fit=crop' },
  { id: 12, name: 'Лук зелёный', emoji: '🧅', price: 60, unitName: 'пучок', note: 'Сочный, острый', category: 'greens', img: 'https://images.unsplash.com/photo-1618512496248-a07fb9c4f506?w=400&h=300&fit=crop' },
];

let cart = {};
let currentCategory = 'all';

function init() {
  if (window.WebApp) {
    window.WebApp.ready();
    window.WebApp.enableClosingConfirmation();
  }
  
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const dateInput = document.getElementById('f-date');
  dateInput.min = tomorrow.toISOString().split('T')[0];
  dateInput.value = dateInput.min;
  
  renderProducts();
}

function renderProducts() {
  const grid = document.getElementById('products-grid');
  const search = document.getElementById('search-input')?.value?.toLowerCase() || '';
  
  let filtered = PRODUCTS;
  if (currentCategory !== 'all') {
    filtered = filtered.filter(p => p.category === currentCategory);
  }
  if (search) {
    filtered = filtered.filter(p => p.name.toLowerCase().includes(search));
  }
  
  grid.innerHTML = filtered.map(p => {
    const qty = cart[p.id] || 0;
    return `
      <div class="product-card" data-id="${p.id}">
        ${p.img 
          ? `<img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''
        }
        <div class="product-img-placeholder" style="${p.img ? 'display:none' : ''}">${p.emoji}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-note">${p.note}</div>
          <div class="product-bottom">
            <div class="product-price">${p.price} ₽ <small>/ ${p.unitName}</small></div>
            ${qty > 0 
              ? `<div class="qty-control">
                  <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
                  <span class="qty-val">${qty}</span>
                  <button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button>
                 </div>`
              : `<button class="add-btn" onclick="addToCart(${p.id})">+</button>`
            }
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  renderProducts();
  updateCartUI();
  if (window.WebApp?.HapticFeedback) {
    window.WebApp.HapticFeedback.impactOccurred('light');
  }
}

function changeQty(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  renderProducts();
  updateCartUI();
}

function updateCartUI() {
  const count = Object.values(cart).reduce((a, b) => a + b, 0);
  const badge = document.getElementById('header-cart-count');
  const fab = document.getElementById('cart-fab');
  const fabBadge = document.getElementById('fab-count');
  
  if (count > 0) {
    badge.style.display = 'flex';
    badge.textContent = count;
    fab.style.display = 'flex';
    fabBadge.textContent = count;
  } else {
    badge.style.display = 'none';
    fab.style.display = 'none';
  }
}

function filterCategory(cat, el) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderProducts();
}

function filterProducts() {
  renderProducts();
}

// ===== КОРЗИНА =====
function renderCart() {
  const container = document.getElementById('cart-content');
  const items = Object.entries(cart).map(([id, qty]) => {
    const p = PRODUCTS.find(x => x.id == id);
    return { ...p, qty };
  }).filter(x => x.qty > 0);
  
  if (items.length === 0) {
    container.innerHTML = `
      <div class="empty-cart">
        <div class="icon">🛒</div>
        <p>Корзина пуста</p>
        <p style="font-size:13px;margin-top:8px;">Добавьте свежих овощей!</p>
      </div>`;
    return;
  }
  
  const total = items.reduce((s, x) => s + x.price * x.qty, 0);
  
  container.innerHTML = `
    <div class="cart-items">
      ${items.map(x => `
        <div class="cart-item">
          <div class="cart-item-img">
            ${x.img 
              ? `<img src="${x.img}" alt="${x.name}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" onerror="this.style.display='none';this.parentElement.innerHTML='${x.emoji}'">`
              : x.emoji
            }
          </div>
          <div class="cart-item-info">
            <div class="cart-item-name">${x.name}</div>
            <div class="cart-item-price">${x.price} ₽ / ${x.unitName}</div>
          </div>
          <div class="cart-item-right">
            <div class="cart-item-total">${x.price * x.qty} ₽</div>
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty(${x.id}, -1)">−</button>
              <span class="qty-val">${x.qty}</span>
              <button class="qty-btn" onclick="changeQty(${x.id}, 1)">+</button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="cart-summary">
      <div class="cart-summary-row">
        <span>Товаров</span>
        <span>${items.length} шт</span>
      </div>
      <div class="cart-summary-row">
        <span>Доставка</span>
        <span style="color:var(--green);">Бесплатно</span>
      </div>
      <div class="cart-summary-row total">
        <span>Итого</span>
        <span class="amount">${total} ₽</span>
      </div>
      <button class="checkout-btn" onclick="showPage('order')">Оформить заказ →</button>
    </div>
  `;
}

// ===== ОФОРМЛЕНИЕ =====
async function submitOrder(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Отправка...';
  
  const items = Object.entries(cart).map(([id, qty]) => {
    const p = PRODUCTS.find(x => x.id == id);
    return `${p.emoji} ${p.name} — ${qty} × ${p.unitName} = ${qty * p.price} ₽`;
  }).join('\n');
  
  const total = Object.entries(cart).reduce((s, [id, qty]) => {
    const p = PRODUCTS.find(x => x.id == id);
    return s + p.price * qty;
  }, 0);
  
  const name = document.getElementById('f-name').value;
  const phone = document.getElementById('f-phone').value;
  const address = document.getElementById('f-address').value;
  const date = document.getElementById('f-date').value;
  const comment = document.getElementById('f-comment').value;
  
  const text = `🛒 НОВЫЙ ЗАКАЗ — Белая дача\n\n${items}\n\n💰 Итого: ${total} ₽\n\n👤 ${name}\n📱 ${phone}\n📍 ${address}\n📅 ${date}\n💬 ${comment || '—'}`;
  
  try {
    const response = await fetch('https://platform-api.max.ru/messages?chat_id=72239874', {
      method: 'POST',
      headers: {
        'Authorization': 'f9LHodD0cOKFL-oH0VPTMHXpJNS6Sw5p6-6njHawNW5WNWZYwLa80iKMfegqFXgB1wINPS85bnC4lZSITS8-',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ text, notify: true })
    });
    
    if (response.ok) {
      document.getElementById('success-text').textContent = 
        `Ваш заказ на сумму ${total} ₽ принят!\n\nДоставка: ${date}\nАдрес: ${address}\n\nОплата наличными при получении.\nМы свяжемся с вами для подтверждения.`;
      
      document.getElementById('success-order').innerHTML = `
        <h3>Детали заказа</h3>
        <p>${items.replace(/\n/g, '<br>')}</p>
        <p style="margin-top:8px;font-weight:600;color:var(--green);">Итого: ${total} ₽</p>
      `;
      
      showPage('success');
    } else {
      alert('Ошибка отправки. Попробуйте позже.');
      btn.disabled = false;
      btn.textContent = 'Подтвердить заказ';
    }
  } catch (err) {
    alert('Ошибка сети. Проверьте подключение.');
    btn.disabled = false;
    btn.textContent = 'Подтвердить заказ';
  }
}

function resetAndGoHome() {
  cart = {};
  updateCartUI();
  document.getElementById('order-form').reset();
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('f-date').value = tomorrow.toISOString().split('T')[0];
  showPage('catalog');
}

// ===== НАВИГАЦИЯ =====
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  window.scrollTo(0, 0);
  
  if (name === 'cart') renderCart();
  if (name === 'catalog') renderProducts();
  
  if (window.WebApp?.BackButton) {
    if (name === 'catalog') {
      window.WebApp.BackButton.hide();
    } else {
      window.WebApp.BackButton.show();
    }
  }
}

if (window.WebApp?.BackButton) {
  window.WebApp.BackButton.onClick(() => {
    const activePage = document.querySelector('.page.active').id;
    if (activePage === 'page-cart') showPage('catalog');
    else if (activePage === 'page-order') showPage('cart');
    else if (activePage === 'page-success') resetAndGoHome();
  });
}

init();
</script>
